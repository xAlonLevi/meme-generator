<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meme-generator</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body onload="onInit()">


    <div class="top-container">

        <header class="logo">
            <h1>
                <img src="icon-imgs/logo.png" alt="MemeGen">
            </h1>
        </header>

        <div class="nav-bar">
            <button class="gallery" onclick="openGallery()">gallery</button>

            <div class="img-Gallery">
                <section></section>
            </div>

            <div class="desktop-menu">
                <button>memes</button>
                <button>about</button>
            </div>

            <button class="menu-btn" onclick="onMenuClick()">
                <img class="menu-icon" src="icon-imgs/Shape.png" alt="menu">
            </button>
        </div>


    </div>


    <div class="tool-bar">

        <div class="canvas-container">
            <canvas width="200px" height="400px"></canvas>
        </div>

        <div class="main-tool-bar">future-controls
            <input type="text" id="myInput" placeholder="Type here">

            <div class="share">download For Now
                <a href="#" onclick="downloadCanvas(this)" download="file-name">share</a>
            </div>

        </div>

    </div>

    <script src="js/main.js"></script>
</body>

</html>
